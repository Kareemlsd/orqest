name: Feature request
description: Suggest an idea or enhancement for Orqest
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Orqest's litmus test: *"Can a developer building a headless coding
        assistant use this feature without knowing what any particular consuming
        app does?"* If the answer is no, the feature likely belongs in the
        consumer, not in core Orqest. Keep this in mind below.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point. What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Sketch the API or behavior if you can.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why they fall short.
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Domain-agnostic check
      options:
        - label: This feature manages the shape/flow of intelligence, not a specific domain's matter/action.
          required: false
