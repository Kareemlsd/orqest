name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write    # required for `mkdocs gh-deploy` to push to gh-pages

concurrency:
  group: docs
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0    # full history; gh-deploy needs it to push to gh-pages

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Sync docs deps
        run: uv sync --group docs

      - name: Deploy MkDocs to gh-pages
        run: uv run mkdocs gh-deploy --force --clean
