name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Minimal token scope: this workflow only reads the repo.
permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest + ruff + mkdocs (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies (incl. dev + docs + optimization groups)
        run: uv sync --group dev --group docs --group optimization

      - name: Ruff lint
        run: uv run ruff check orqest/

      - name: Pytest (non-docker)
        run: uv run pytest tests/ -m "not docker" --tb=short -q

      - name: Build docs (strict)
        run: uv run mkdocs build --strict
