# Polymath — local dev stack.
#
# Four services on one bridge network. Postgres persists sessions/messages/
# artifacts metadata. The sandbox image is BUILT but only spun up on demand
# by the backend's SandboxManager (one container per session, created lazily
# on first chat message).
#
# `docker compose up --build` runs the demo. Open http://localhost:3000.
#
# The Orqest source tree is bind-mounted read-only into the backend so
# `pip install -e /orqest` stays live across edits.

services:
  postgres:
    image: postgres:16-alpine
    container_name: polymath-postgres
    environment:
      POSTGRES_USER: polymath
      POSTGRES_PASSWORD: polymath
      POSTGRES_DB: polymath
    volumes:
      - polymath-pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polymath -d polymath"]
      interval: 3s
      timeout: 3s
      retries: 20
    networks:
      - polymath-net

  # Sandbox image is only built here so the SandboxManager can `docker run`
  # instances of it. This service itself doesn't stay up — `restart: "no"`
  # and a trivial sleep so compose can validate the image built cleanly.
  sandbox-builder:
    image: polymath-sandbox:latest
    container_name: polymath-sandbox-builder
    build:
      context: ./sandbox
    command: ["sh", "-c", "echo 'polymath-sandbox image built' && exit 0"]
    restart: "no"
    networks:
      - polymath-net

  backend:
    container_name: polymath-backend
    dns:
      # Docker Desktop sometimes fails to propagate the host's resolver
      # into user-defined bridge networks. Pin public DNS so OpenAI /
      # Anthropic / search-provider APIs resolve regardless.
      - 8.8.8.8
      - 1.1.1.1
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      # sandbox-builder is a one-shot that builds the polymath-sandbox image
      # (used by the backend's SandboxManager via `docker run`). It's not
      # runtime-required; once the image is cached in the Docker daemon,
      # subsequent `docker compose up` runs can skip it by omitting
      # `--build` or by running `docker compose up backend frontend postgres`.
    environment:
      DATABASE_URL: "postgresql+asyncpg://polymath:polymath@postgres:5432/polymath"
      LLM_MODEL: "${LLM_MODEL:-openai:gpt-4.1}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ORQEST_WEB_PROVIDER: "${ORQEST_WEB_PROVIDER:-none}"
      ORQEST_WEB_API_KEY: "${ORQEST_WEB_API_KEY:-}"
      POLYMATH_USE_MCP: "${POLYMATH_USE_MCP:-0}"
      POLYMATH_SANDBOX_IMAGE: "polymath-sandbox:latest"
      POLYMATH_SANDBOX_NETWORK: "polymath_polymath-net"
      POLYMATH_MEMORY_DIR: "/data/memory"
      POLYMATH_ARTIFACT_DIR: "/data/artifacts"
      PYTHONUNBUFFERED: "1"
    volumes:
      # Live-mount Orqest source so the entrypoint stages a writable copy
      # and `pip install` picks up source edits on container restart.
      - ../..:/orqest:ro
      # Live-mount the polymath package so uvicorn --reload picks up edits
      # without a full image rebuild.
      - ./backend/polymath:/app/polymath
      - polymath-backend-data:/data
      # SandboxManager needs access to the Docker daemon to spawn per-session
      # containers. This is what makes "Docker-in-Docker-via-socket-mount"
      # work without DinD. Demo-grade security; documented.
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=2).getcode() in (200, 503) else 1)"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - polymath-net

  frontend:
    container_name: polymath-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_BACKEND_URL: "http://localhost:8000"
      # The in-container backend URL used by Next.js server-side rewrites
      # and any RSC fetches. Different from the public one above because
      # the browser hits :8000 on the host, not the docker network.
      BACKEND_INTERNAL_URL: "http://backend:8000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    networks:
      - polymath-net

volumes:
  polymath-pgdata:
  polymath-backend-data:

networks:
  polymath-net:
    driver: bridge
