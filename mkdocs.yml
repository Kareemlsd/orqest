site_name: Orqest
site_url: https://kareemlsd.github.io/orqest/
site_description: Typed agent primitives and orchestration on top of pydantic-ai — memory, autonomy, healing, metacognition, generative UI, MCP, and reflective optimization.
site_author: Kareem El Sayed
repo_url: https://github.com/Kareemlsd/orqest
repo_name: Kareemlsd/orqest
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2025 Kareem El Sayed

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
    logo: material/graph-outline
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - content.tooltips
    - content.action.edit
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - toc.follow

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Kareemlsd/orqest
      name: Orqest on GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/orqest/
      name: Orqest on PyPI

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
  - attr_list
  - def_list
  - md_in_html
  - tables

plugins:
  - search
  - include-markdown
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
      fallback_to_build_date: true
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            heading_level: 3
            members_order: source
            show_signature_annotations: true
            separate_signature: true
            docstring_style: google
            show_docstring_examples: true
            show_bases: false
            merge_init_into_class: true

