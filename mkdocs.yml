site_name: Orqest
site_url: https://kareemlsd.github.io/orqest/
site_description: A Python framework for building autonomous agentic AI systems on top of pydantic-ai
repo_url: https://github.com/Kareemlsd/orqest
repo_name: Kareemlsd/orqest

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - def_list

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            heading_level: 3
            members_order: source
            show_signature_annotations: true
            separate_signature: true
            docstring_style: google

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Concepts:
      - Agents: concepts/agents.md
      - State & History: concepts/state-and-history.md
      - Agent as Tool: concepts/agent-as-tool.md
      - Streaming: concepts/streaming.md
      - Orchestration: concepts/orchestration.md
      - Hooks & Lifecycle: concepts/hooks-and-lifecycle.md
      - Session Persistence: concepts/session-persistence.md
      - Compound Tools: concepts/compound-tools.md
      - Memory: concepts/memory.md
      - Observability: concepts/observability.md
  - API Reference:
      - Configuration: api/config.md
      - Agents: api/agents.md
      - Orchestration: api/orchestration.md
      - Hooks: api/hooks.md
      - Memory: api/memory.md
      - Observability: api/observability.md
      - Model Resolution: api/utils.md
      - System Prompts: api/io-utils.md
  - Changelog: changelog.md
