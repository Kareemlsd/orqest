[project]
name = "orqest"
version = "0.0.1"
description = "Building framework for scalable advanced agentic system using OOP"
authors = [
  { name="Kareem El Sayed", email="k.elsayed@outlook.com" }
]
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "dotenv>=0.9.9",
  "loguru>=0.7.3",
  "markdown>=3.8.2",
  "openai>=1.93.0",
  "pydantic>=2.11.7",
  "pydantic-ai>=1.37.0",
  "pytest>=8.4.1",
  "pytest-asyncio>=1.0.0",
  "python-dotenv>=1.1.1",
]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["orqest*"]

[dependency-groups]
dev = [
    "pre-commit>=4.0.1",
    "ruff>=0.7.3",
    "pytest>=8.3.3",
    "pytest-md>=0.2.0",
    "pytest-emoji>=0.2.0",
]
docs = [
    "mkdocs>=1.6",
    "mkdocs-material>=9.6",
    "mkdocstrings[python]>=0.28",
]

[tool.ruff]
lint.select = [
    "E",
    "W",
    "F",
    "I",
    "C",
    "C90",
    "S",
    "A",
    "D",
]

lint.ignore = [
    "D203",
    "D213"
]

[tool.ruff.lint.per-file-ignores]

[tool.ruff.lint.isort]
known-third-party = ["pandas", "pydantic", "matplotlib", "shapely", "scipy", "munch"]

[tool.ruff.lint.mccabe]
max-complexity = 10
